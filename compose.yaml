services:
  postgres:
    image: postgres:18
    restart: always
    volumes:
      - ./postgres-db-data/:/var/lib/postgresql/data
    ports:
      - "5463:5432" 
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}

  extractor: 
    build: 
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on: 
      - postgres
       